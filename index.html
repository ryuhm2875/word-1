<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>류봉두의 국어수업 — 어휘 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2F4F6;--surface:#FFF;--surface2:#F8F9FA;--primary:#3182F6;--primary-light:#EBF3FE;--primary-dark:#1A6EED;--success:#00C471;--success-light:#E5FAF1;--danger:#F03E3E;--danger-light:#FFF0F0;--text1:#191F28;--text2:#4E5968;--text3:#8B95A1;--border:#E5E8EB;--radius:16px;--radius-sm:10px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px}
.topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:20px 0 12px}
.topbar-brand{font-size:14px;font-weight:800;color:var(--primary)}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-user{font-size:13px;color:var(--text2);font-weight:600;display:none}
.card{width:100%;max-width:480px;background:var(--surface);border-radius:var(--radius);padding:28px 24px;box-shadow:var(--shadow);margin-top:12px}
.hero-emoji{font-size:36px;margin-bottom:14px;display:block}
.hero-title{font-size:26px;font-weight:800;letter-spacing:-.8px;line-height:1.25;margin-bottom:8px}
.hero-desc{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:24px}
.input-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.input-field{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-size:16px;font-family:inherit;color:var(--text1);background:var(--surface);outline:none;transition:border-color .2s;margin-bottom:20px}
.input-field:focus{border-color:var(--primary)}
.input-field::placeholder{color:var(--text3)}
.sel-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px}
.sel-grid{display:grid;gap:8px;margin-bottom:20px}
.sel-grid.col3{grid-template-columns:1fr 1fr 1fr}
.sel-grid.col5{grid-template-columns:repeat(5,1fr)}
.sel-grid.col4{grid-template-columns:1fr 1fr 1fr 1fr}
.sel-btn{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface)}
.sel-btn:hover{border-color:var(--primary);background:var(--primary-light)}
.sel-btn.active{border-color:var(--primary);background:var(--primary-light)}
.sel-btn .s-main{font-size:13px;font-weight:800;color:var(--text1)}
.sel-btn .s-sub{font-size:10px;color:var(--text3);margin-top:3px}
.sel-btn.active .s-main,.sel-btn.active .s-sub{color:var(--primary)}
/* 고등·마스터 레벨 뱃지 */
.sel-btn.lv4 .s-main{color:#B8860B}
.sel-btn.lv5 .s-main{color:#C62828}
.sel-btn.lv4.active{border-color:#F5A623;background:#FFF8E6}
.sel-btn.lv5.active{border-color:#E53935;background:#FFF0F0}
.btn-primary{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:-.3px}
.btn-primary:hover{background:var(--primary-dark)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.btn-secondary{width:100%;background:var(--surface2);color:var(--text1);border:none;border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;margin-top:10px}
.btn-secondary:hover{background:var(--border)}
.btn-outline{width:100%;background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:var(--radius-sm);padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:10px}
.btn-outline:hover{background:var(--primary-light)}
.quiz-header{width:100%;max-width:480px;margin-top:8px}
.progress-bar-wrap{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-bar-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s ease}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px;color:var(--text3);font-weight:500}
.quiz-score-badge{background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.live-level-wrap{margin-top:10px;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px}
.live-emoji{font-size:22px;flex-shrink:0}
.live-info{flex:1;min-width:0}
.live-title{font-size:12px;font-weight:800;color:var(--text1)}
.live-sub{font-size:11px;color:var(--text3);margin-top:1px}
.live-right{flex-shrink:0;text-align:right}
.live-pct-num{font-size:14px;font-weight:800;color:var(--primary);margin-bottom:4px}
.live-bar-bg{width:64px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.live-bar-fill{height:100%;border-radius:3px;transition:width .4s ease,background-color .4s ease;width:0%}
/* 고난도 문제용 태그 */
.difficulty-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px}
.diff-normal{background:var(--primary-light);color:var(--primary)}
.diff-hard{background:#FFF3CD;color:#856404}
.diff-expert{background:#FFF0F0;color:#C62828}
.q-type-tag{display:inline-block;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.q-text{font-size:17px;font-weight:700;line-height:1.55;letter-spacing:-.5px;color:var(--text1);margin-bottom:6px}
.q-hint{font-size:13px;color:var(--text3);margin-bottom:22px;line-height:1.7;background:var(--surface2);border-radius:8px;padding:10px 12px}
.q-hint.no-hint{background:transparent;padding:0}
.options-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.option-btn{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;font-weight:500;font-family:inherit;color:var(--text1);cursor:pointer;text-align:left;transition:all .15s;line-height:1.6;display:flex;align-items:flex-start;gap:12px}
.option-btn:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light)}
.option-btn.correct{border-color:var(--success);background:var(--success-light);color:#00864E}
.option-btn.wrong{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
.option-btn.reveal{border-color:var(--success);background:var(--success-light);color:#00864E}
.option-btn:disabled{cursor:not-allowed}
.opt-label{display:flex;align-items:center;justify-content:center;min-width:26px;height:26px;border-radius:6px;background:var(--surface2);font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0;margin-top:1px}
.option-btn.correct .opt-label{background:var(--success);color:#fff}
.option-btn.wrong .opt-label{background:var(--danger);color:#fff}
.option-btn.reveal .opt-label{background:var(--success);color:#fff}
.feedback-box{border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;font-weight:500;line-height:1.65;margin-bottom:14px;display:none}
.feedback-box.show{display:block}
.feedback-box.ok{background:var(--success-light);color:#00864E;border-left:4px solid var(--success)}
.feedback-box.ng{background:var(--danger-light);color:#C92A2A;border-left:4px solid var(--danger)}
.fb-title{font-weight:800;margin-bottom:5px;font-size:14px}
.fb-meaning{font-size:13px;margin-top:2px}
.fb-example{font-size:12px;color:var(--text3);margin-top:6px;font-style:italic}
/* RESULT */
.title-banner{border-radius:var(--radius);padding:22px 20px;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,#1A6EED,#3182F6)}
.title-banner.gold{background:linear-gradient(135deg,#B8860B,#F5A623)}
.title-banner.silver{background:linear-gradient(135deg,#5A7A8A,#8EAABB)}
.title-banner.bronze{background:linear-gradient(135deg,#7B5A3A,#C08553)}
.title-banner.green{background:linear-gradient(135deg,#2E7D32,#43A047)}
.title-banner.sprout{background:linear-gradient(135deg,#558B2F,#7CB342)}
.title-banner.red{background:linear-gradient(135deg,#C62828,#E53935)}
.banner-emoji{font-size:40px;display:block;margin-bottom:8px}
.banner-title{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:4px}
.banner-sub{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;white-space:pre-line}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.rstat{background:var(--surface2);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.rstat-num{font-size:22px;font-weight:800;letter-spacing:-1px}
.rstat-label{font-size:11px;color:var(--text3);margin-top:3px}
.rstat.c .rstat-num{color:var(--success)}
.rstat.w .rstat-num{color:var(--danger)}
.rstat.s .rstat-num{color:var(--primary)}
.send-status{text-align:center;font-size:13px;font-weight:600;padding:12px;border-radius:var(--radius-sm);margin-top:10px;display:none}
.send-status.sending{background:var(--primary-light);color:var(--primary);display:block}
.send-status.sent{background:var(--success-light);color:#00864E;display:block}
.send-status.failed{background:var(--danger-light);color:var(--danger);display:block}
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:6px}
.wrong-list{display:flex;flex-direction:column;gap:8px}
.wrong-item{background:var(--danger-light);border-radius:var(--radius-sm);padding:12px 14px;border-left:3px solid var(--danger)}
.wrong-word{font-size:15px;font-weight:700;color:var(--danger);margin-bottom:3px}
.wrong-meaning{font-size:13px;color:var(--text2);line-height:1.5}
.wrong-example{font-size:12px;color:var(--text3);margin-top:4px;font-style:italic}
.score-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.score-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm)}
.score-rank{font-size:13px;font-weight:800;color:var(--text3);width:22px;text-align:center}
.score-rank.r1{color:#F5A623}.score-rank.r2{color:#9B9B9B}.score-rank.r3{color:#C08553}
.score-name{flex:1;font-size:14px;font-weight:600}
.score-val{font-size:13px;font-weight:700;color:var(--primary)}
.grade-badge{font-size:10px;background:var(--primary-light);color:var(--primary);padding:2px 6px;border-radius:4px;font-weight:700}
.divider{height:1px;background:var(--border);margin:20px 0}
.screen{display:none}
.screen.active{display:block;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-brand">류봉두의 국어수업</div>
    <div class="topbar-sub">고흥대서중학교 어휘 퀴즈</div>
  </div>
  <div class="topbar-user" id="topbar-user"></div>
</div>

<!-- START -->
<div id="screen-start" class="screen active">
  <div class="card">
    <span class="hero-emoji">📚</span>
    <div class="hero-title">어휘 마스터 퀴즈</div>
    <div class="hero-desc">중1부터 마스터까지 5단계 레벨로<br>국어 어휘 실력을 확인해 보세요!</div>
    <div class="input-label">이름</div>
    <input class="input-field" id="name-input" type="text" placeholder="예: 홍길동" maxlength="10" autocomplete="off">
    <div class="sel-label">학년·레벨 선택</div>
    <div class="sel-grid col5">
      <div class="sel-btn active" data-grade="1" onclick="selectGrade(this,1)"><div class="s-main">중1</div><div class="s-sub">120단어</div></div>
      <div class="sel-btn" data-grade="2" onclick="selectGrade(this,2)"><div class="s-main">중2</div><div class="s-sub">118단어</div></div>
      <div class="sel-btn" data-grade="3" onclick="selectGrade(this,3)"><div class="s-main">중3</div><div class="s-sub">100단어</div></div>
      <div class="sel-btn lv4" data-grade="4" onclick="selectGrade(this,4)"><div class="s-main">고등</div><div class="s-sub">120단어</div></div>
      <div class="sel-btn lv5" data-grade="5" onclick="selectGrade(this,5)"><div class="s-main">마스터</div><div class="s-sub">120단어</div></div>
    </div>
    <div class="sel-label">문제 수</div>
    <div class="sel-grid col4">
      <div class="sel-btn" data-count="20" onclick="selectCount(this,20)"><div class="s-main">20</div><div class="s-sub">빠르게</div></div>
      <div class="sel-btn" data-count="50" onclick="selectCount(this,50)"><div class="s-main">50</div><div class="s-sub">절반</div></div>
      <div class="sel-btn active" data-count="0" onclick="selectCount(this,0)"><div class="s-main">전체</div><div class="s-sub" id="count-all-sub">120문제</div></div>
    </div>
    <button class="btn-primary" id="start-btn" onclick="startQuiz()" disabled>퀴즈 시작하기 →</button>
  </div>
  <div class="card" id="scoreboard-card" style="display:none">
    <div class="section-title">🏆 역대 기록</div>
    <div class="score-list" id="score-list-start"></div>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="quiz-meta">
      <span id="quiz-progress">1 / 120</span>
      <span class="quiz-score-badge" id="quiz-score-badge">0점</span>
    </div>
    <div class="live-level-wrap">
      <div class="live-emoji" id="live-emoji">🌱</div>
      <div class="live-info">
        <div class="live-title" id="live-title">류봉두의 떡잎</div>
        <div class="live-sub" id="live-sub">문제를 풀수록 레벨이 올라가요!</div>
      </div>
      <div class="live-right">
        <div class="live-pct-num" id="live-pct">-</div>
        <div class="live-bar-bg"><div class="live-bar-fill" id="live-bar"></div></div>
      </div>
    </div>
  </div>
  <div class="card" id="quiz-card">
    <div style="display:flex;align-items:center;margin-bottom:12px">
      <div class="q-type-tag" id="q-type-tag"></div>
      <span class="difficulty-badge" id="diff-badge"></span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-box" id="feedback-box">
      <div class="fb-title" id="fb-title"></div>
      <div class="fb-meaning" id="fb-meaning"></div>
      <div class="fb-example" id="fb-example"></div>
    </div>
    <button class="btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="card">
    <div class="title-banner" id="title-banner">
      <span class="banner-emoji" id="banner-emoji"></span>
      <div class="banner-title" id="banner-title"></div>
      <div class="banner-sub" id="banner-sub"></div>
    </div>
    <div class="result-stats">
      <div class="rstat c"><div class="rstat-num" id="res-correct">0</div><div class="rstat-label">정답</div></div>
      <div class="rstat w"><div class="rstat-num" id="res-wrong">0</div><div class="rstat-label">오답</div></div>
      <div class="rstat s"><div class="rstat-num" id="res-score">0</div><div class="rstat-label">점수</div></div>
    </div>
    <button class="btn-primary" id="btn-send" onclick="sendToSheet()">📤 결과 전송하기</button>
    <div class="send-status" id="send-status"></div>
    <button class="btn-outline" onclick="retryQuiz()">🔄 다시 도전하기</button>
    <button class="btn-secondary" onclick="goHome()">처음으로</button>
    <div id="wrong-section" style="display:none">
      <div class="divider"></div>
      <div class="section-title">❌ 틀린 단어 복습 <span id="wrong-count-badge" style="background:var(--danger-light);color:var(--danger);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-left:4px"></span></div>
      <div class="wrong-list" id="wrong-list"></div>
    </div>
  </div>
  <div class="card" style="margin-top:12px">
    <div class="section-title">🏆 역대 기록</div>
    <div class="score-list" id="score-list-result"></div>
  </div>
</div>
<script>
// ── 중1 단어 (120개) ──
const WORDS_1=[
{id:1,word:"요점",hanja:"要點",meaning:"말이나 글에서 가장 중심이 되는 중요한 부분.",example:"선생님께서 핵심 요점만 간추려 설명해 주셨다."},
{id:2,word:"개요",hanja:"槪要",meaning:"전체적인 내용의 대강을 추린 것.",example:"글을 쓰기 전에 개요를 먼저 작성하면 도움이 된다."},
{id:3,word:"요소",hanja:"要素",meaning:"사물의 성립에 없어서는 안 되는 근본 조건.",example:"의식주는 인간 생활의 기본 요소이다."},
{id:4,word:"요긴하다",hanja:"要緊—",meaning:"꼭 필요하고 소중하다.",example:"이 도구는 살림에 아주 요긴하게 쓰인다."},
{id:5,word:"방대하다",hanja:"尨大—",meaning:"규모나 양이 매우 크다.",example:"도서관에는 방대한 양의 자료가 보관되어 있다."},
{id:6,word:"급진적",hanja:"急進的",meaning:"변화나 발전의 속도가 매우 빠르고 격렬한 것.",example:"사회 변화가 너무 급진적으로 이루어지면 혼란이 생길 수 있다."},
{id:7,word:"비약적",hanja:"飛躍的",meaning:"단계를 밟지 않고 빠르게 발전하거나 향상되는 것.",example:"기계 발명으로 생산량이 비약적으로 늘어났다."},
{id:8,word:"재간",hanja:"才幹",meaning:"어떤 일을 해낼 수 있는 재주와 능력.",example:"그를 설득하는 데는 도저히 당할 재간이 없었다."},
{id:9,word:"구분",hanja:"區分",meaning:"일정한 기준에 따라 전체를 몇 개의 부분으로 나눔.",example:"읽은 책과 읽지 않은 책을 따로 구분해 두었다."},
{id:10,word:"성찰",hanja:"省察",meaning:"자기의 마음을 반성하고 살핌.",example:"하루를 마무리하며 자신의 행동을 성찰하는 습관을 길렀다."},
{id:11,word:"진솔하다",hanja:"眞率—",meaning:"진실하고 솔직하다.",example:"그는 자신의 실수를 진솔하게 인정했다."},
{id:12,word:"의연하다",hanja:"毅然—",meaning:"의지가 굳세고 꿋꿋하다.",example:"그녀는 어려움 속에서도 항상 의연하게 행동했다."},
{id:13,word:"생채기",hanja:"",meaning:"손톱이나 날카로운 것에 긁혀서 생긴 작은 상처.",example:"나뭇가지에 긁혀 팔에 생채기가 났다."},

{id:33,word:"3인칭 관찰자 시점",hanja:"三人稱觀察者視點",meaning:"작품 밖의 서술자가 인물의 내면을 모르고 외부의 행동과 대화만을 객관적으로 묘사하는 시점.",example:"'철수는 아무 말 없이 창밖만 바라보았다'처럼 외부만 서술하는 시점이다.",similar:["전지적 작가 시점","1인칭 관찰자 시점","요약적 제시"]},
{id:34,word:"복선",hanja:"伏線",meaning:"앞으로 일어날 사건을 독자가 짐작할 수 있도록 미리 깔아두는 서사 장치.",example:"비가 올 것 같은 흐린 날씨 묘사가 불행한 결말을 암시하는 복선이다.",similar:["액자식 구성","역순행적 구성","서사"]},
{id:35,word:"액자식 구성",hanja:"額子式構成",meaning:"바깥 이야기(외화) 속에 핵심 이야기(내화)가 들어있는 이중 구조.",example:"할머니가 손자에게 옛날이야기를 들려주는 형식이 액자식 구성이다.",similar:["역순행적 구성","순행적 구성","복선"]},
{id:36,word:"역순행적 구성",hanja:"逆順行的構成",meaning:"시간의 흐름을 거슬러 현재에서 과거로 돌아가는 소설 구성 방식.",example:"어른이 된 주인공이 어린 시절을 회상하는 방식이 역순행적 구성이다.",similar:["순행적 구성","액자식 구성","복선"]},
{id:37,word:"전형적 인물",hanja:"典型的人物",meaning:"특정 집단이나 계층을 대표하는 보편적인 성격을 가진 인물.",example:"고전 소설의 충신이나 악처는 특정 계층을 대표하는 전형적 인물이다.",similar:["개성적 인물","평면적 인물","입체적 인물"]},
{id:38,word:"입체적 인물",hanja:"立體的人物",meaning:"사건을 겪으며 성격이나 가치관이 변화하는 인물.",example:"이기적이었다가 타인을 위해 희생하게 된 주인공이 입체적 인물이다.",similar:["평면적 인물","전형적 인물","개성적 인물"]},
{id:39,word:"풍자",hanja:"諷刺",meaning:"사회의 부정적인 면이나 인간의 어리석음을 간접적으로 비웃으며 비판하는 표현 방식.",example:"양반의 무능함을 조롱하는 판소리나 탈춤이 풍자에 해당한다.",similar:["해학","반어법","우의적"]},
{id:40,word:"해학",hanja:"諧謔",meaning:"대상을 우스꽝스럽게 표현하여 웃음을 유발하지만 그 속에 연민과 동정심을 담는 표현 방식.",example:"김유정 소설 속 어리숙한 인물을 통해 드러나는 웃음이 해학이다.",similar:["풍자","반어법","골계미"]},
{id:41,word:"내적 갈등",hanja:"內的葛藤",meaning:"인물의 마음속에서 일어나는 심리적 고민이나 대립.",example:"진실을 말할지 침묵할지 양심의 가책을 느끼는 주인공의 고민이 내적 갈등이다.",similar:["외적 갈등","절정","위기"]},
{id:42,word:"외적 갈등",hanja:"外的葛藤",meaning:"인물과 다른 인물, 사회, 자연, 운명 등 외부 환경 사이의 대립.",example:"독립운동가와 일제 경찰의 대립이 외적 갈등이다.",similar:["내적 갈등","절정","위기"]},
{id:43,word:"요약적 제시",hanja:"要約的提示",meaning:"서술자가 긴 시간의 사건이나 정보를 짧게 간추려 직접 설명하는 서술 방식.",example:"'그 후로 10년의 세월이 무심히 흘렀다'처럼 서술자가 시간을 압축하는 방식이다.",similar:["묘사","서사","3인칭 관찰자 시점"]},
{id:44,word:"모티프",hanja:"motif",meaning:"이야기의 뼈대가 되는 반복적이고 기본적인 동기나 소재.",example:"계모의 학대, 변신, 영웅의 성장 등이 이야기의 반복되는 모티프이다.",similar:["복선","액자식 구성","전형적 인물"]},

{id:45,word:"논지",hanja:"論旨",meaning:"글쓴이가 글 전체를 통해 주장하고자 하는 핵심적인 생각.",example:"이 글의 논지는 '무분별한 개발을 멈춰야 한다'이다.",similar:["요지","전제","논거"]},
{id:46,word:"요지",hanja:"要旨",meaning:"글이나 문단의 핵심 내용을 간략하게 요약한 것.",example:"1문단의 요지를 파악하며 글을 읽어야 한다.",similar:["논지","전제","개요"]},
{id:47,word:"연역법",hanja:"演繹法",meaning:"일반적인 원리나 법칙에서 구체적이고 개별적인 사실을 이끌어내는 논리 방법.",example:"'사람은 죽는다 → 소크라테스는 사람이다 → 소크라테스는 죽는다'가 연역법이다.",similar:["귀납법","유추","변증법"]},
{id:48,word:"귀납법",hanja:"歸納法",meaning:"구체적인 여러 사례를 모아 일반적인 원리나 결론을 이끌어내는 논리 방법.",example:"'참새, 까치, 비둘기가 난다 → 모든 새는 난다'가 귀납법이다.",similar:["연역법","유추","귀납적 도약"]},
{id:49,word:"유추",hanja:"類推",meaning:"두 대상의 비슷한 속성을 바탕으로, 다른 속성도 비슷할 것이라 미루어 짐작하는 논리.",example:"정교한 시계에 설계자가 있듯이 정교한 우주도 창조자가 있다는 것이 유추이다.",similar:["귀납법","연역법","추론"]},
{id:50,word:"분류",hanja:"分類",meaning:"일정한 기준에 따라 대상을 같은 종류끼리 묶거나 나누어 설명하는 방법.",example:"쓰레기를 종이류, 플라스틱류, 캔류로 나누는 것이 분류이다.",similar:["분석","정의","비교"]},
{id:51,word:"분석",hanja:"分析",meaning:"하나의 대상을 구성하는 여러 요소로 쪼개어 부분별로 설명하는 방법.",example:"시계를 톱니바퀴, 태엽, 시곗바늘로 쪼개어 설명하는 것이 분석이다.",similar:["분류","정의","과정"]},
{id:52,word:"비교",hanja:"比較",meaning:"두 개 이상의 대상에서 비슷한 점(공통점)을 중심으로 설명하는 방법.",example:"한국어와 일본어의 어순이 같다는 공통점을 밝히는 것이 비교이다.",similar:["대조","분류","인과"]},
{id:53,word:"대조",hanja:"對照",meaning:"두 개 이상의 대상에서 다른 점(차이점)을 중심으로 설명하는 방법.",example:"북극은 바다이고 남극은 대륙이라는 차이를 밝히는 것이 대조이다.",similar:["비교","분류","대조법"]},
{id:54,word:"인과",hanja:"因果",meaning:"원인과 그로 인해 발생한 결과의 관계로 사물을 설명하는 방법.",example:"온실가스 증가가 원인이 되어 지구 온난화가 심해졌다고 설명하는 것이 인과이다.",similar:["과정","귀납법","연역법"]},
{id:55,word:"통시적 관점",hanja:"通時的觀點",meaning:"시간의 흐름에 따른 역사적 변화 과정을 살펴보는 관점.",example:"한글이 15세기 창제부터 현대까지 어떻게 변했는지 연구하는 것이 통시적 관점이다.",similar:["공시적 관점","거시적 관점","미시적 관점"]},
{id:56,word:"공시적 관점",hanja:"共時的觀點",meaning:"시간의 흐름을 멈추고 특정 시점의 상태나 구조를 살펴보는 관점.",example:"2024년 현재 한국 10대들의 언어 습관을 분석하는 것이 공시적 관점이다.",similar:["통시적 관점","미시적 관점","거시적 관점"]},
{id:57,word:"타당성",hanja:"妥當性",meaning:"글의 주장이나 근거가 이치에 맞고 합리적인지를 평가하는 기준.",example:"주장에 비해 근거가 빈약하면 타당성이 떨어진다.",similar:["신뢰성","논거","객관성"]},
{id:58,word:"신뢰성",hanja:"信賴性",meaning:"글에 쓰인 정보나 출처가 믿을 만한지를 평가하는 기준.",example:"전문가의 의견을 인용하면 글의 신뢰성이 높아진다.",similar:["타당성","논거","객관성"]},
{id:59,word:"통념",hanja:"通念",meaning:"사회 구성원들이 널리 인정하고 있는 일반적이고 습관적인 생각.",example:"'실패는 무조건 나쁜 것이다'라는 사회적 통념을 깨는 시각이 필요하다.",similar:["객관성","타당성","주관성"]},
{id:60,word:"변증법",hanja:"辯證法",meaning:"정(기존 주장)과 반(반론)이 부딪혀 합(더 나은 결론)으로 나아가는 논리 방법.",example:"개발(정)과 보존(반)의 갈등 끝에 친환경 개발(합)을 도출하는 것이 변증법이다.",similar:["연역법","귀납법","유추"]},

{id:61,word:"형태소",hanja:"形態素",meaning:"뜻을 가진 가장 작은 말의 단위. 더 쪼개면 의미가 사라진다.",example:"'풋사과'는 '풋-'과 '사과' 두 형태소로 나뉜다.",similar:["음운","어근","접사"]},
{id:62,word:"실질 형태소",hanja:"實質形態素",meaning:"구체적인 대상이나 상태 등 실질적인 의미를 가진 형태소.",example:"'밥을 먹다'에서 '밥', '먹-'이 실질 형태소이다.",similar:["형식 형태소","자립 형태소","의존 형태소"]},
{id:63,word:"형식 형태소",hanja:"形式形態素",meaning:"문법적인 기능만 하고 실질적 의미가 없는 형태소. 조사, 어미, 접사가 해당된다.",example:"'밥을 먹다'에서 '-을', '-다'가 형식 형태소이다.",similar:["실질 형태소","자립 형태소","의존 형태소"]},
{id:64,word:"자립 형태소",hanja:"自立形態素",meaning:"다른 말의 도움 없이 혼자 단독으로 단어가 될 수 있는 형태소.",example:"'바다', '하늘', '책'이 자립 형태소이다.",similar:["의존 형태소","실질 형태소","형식 형태소"]},
{id:65,word:"의존 형태소",hanja:"依存形態素",meaning:"반드시 다른 말에 붙어서만 쓰일 수 있는 형태소.",example:"'먹었다'의 '먹-', '-었-', '-다'는 모두 의존 형태소이다.",similar:["자립 형태소","형식 형태소","실질 형태소"]},
{id:66,word:"수식언",hanja:"修飾言",meaning:"뒤에 오는 다른 말을 꾸며 주는 역할을 하는 단어. 관형사와 부사가 이에 해당한다.",example:"'새 신발'의 '새'(관형사), '매우 빠르다'의 '매우'(부사)가 수식언이다.",similar:["체언","용언","관계언"]},
{id:67,word:"관계언",hanja:"關係言",meaning:"체언 뒤에 붙어 문장 성분 사이의 문법적 관계를 나타내는 단어. 조사가 이에 해당한다.",example:"'철수가 학교에 간다'에서 '가', '에'가 관계언(조사)이다.",similar:["체언","용언","수식언"]},
{id:68,word:"독립언",hanja:"獨立言",meaning:"다른 문장 성분과 독립적으로 쓰이는 단어. 감탄사가 이에 해당한다.",example:"'앗, 차가워!'에서 '앗'이 독립언(감탄사)이다.",similar:["관계언","수식언","체언"]},
{id:69,word:"어간",hanja:"語幹",meaning:"용언이 활용할 때 변하지 않는 앞부분.",example:"'먹고, 먹으니, 먹어서'에서 '먹-'이 어간이다.",similar:["어미","용언","접사"]},
{id:70,word:"어미",hanja:"語尾",meaning:"용언이 활용될 때 문법적 역할에 따라 다양하게 변하는 뒷부분.",example:"'먹고, 먹으니'에서 '-고', '-으니'가 어미이다.",similar:["어간","용언","형식 형태소"]},
{id:71,word:"주동 표현",hanja:"主動表現",meaning:"주어가 자기 힘으로 동작을 직접 하는 표현.",example:"'아이가 밥을 먹는다'는 주어가 직접 행동하는 주동 표현이다.",similar:["사동 표현","능동 표현","피동 표현"]},
{id:72,word:"사동 표현",hanja:"使動表現",meaning:"주어가 다른 대상에게 어떤 동작을 하도록 시키는 표현.",example:"'엄마가 아이에게 밥을 먹인다'처럼 남에게 동작을 시키는 것이 사동 표현이다.",similar:["주동 표현","피동 표현","능동 표현"]},
{id:73,word:"능동 표현",hanja:"能動表現",meaning:"주어가 제 힘으로 행동하는 표현.",example:"'고양이가 쥐를 잡았다'는 주어가 스스로 행동하는 능동 표현이다.",similar:["피동 표현","주동 표현","사동 표현"]},
{id:74,word:"피동 표현",hanja:"被動表現",meaning:"주어가 다른 대상의 행동을 당하는 표현.",example:"'쥐가 고양이에게 잡혔다'는 주어가 행동을 당하는 피동 표현이다.",similar:["능동 표현","사동 표현","주동 표현"]},
{id:75,word:"음운의 교체",hanja:"音韻의交替",meaning:"한 음운이 주변 환경에 따라 다른 음운으로 바뀌는 현상.",example:"'국물'이 [궁물]로 발음되는 비음화가 음운의 교체이다.",similar:["음운의 탈락","음운의 축약","음운의 첨가"]},
{id:76,word:"음운의 탈락",hanja:"音韻의脫落",meaning:"원래 있던 두 음운 중 하나가 없어지는 현상.",example:"'솔+나무'가 '소나무'가 되는 것처럼 ㄹ이 없어지는 것이 음운의 탈락이다.",similar:["음운의 교체","음운의 축약","음운의 첨가"]},

{id:42,word:"독립변인",hanja:"獨立變因",meaning:"실험에서 연구자가 의도적으로 조작하는 원인이 되는 변수.",example:"비료의 양을 다르게 주었을 때, 비료의 양이 독립변인이다.",similar:["종속변인","상관관계","인과관계"]},
{id:43,word:"종속변인",hanja:"從屬變因",meaning:"실험에서 독립변인의 변화에 따라 결과적으로 변하는 변수.",example:"비료의 양에 따라 달라지는 식물의 성장 높이가 종속변인이다.",similar:["독립변인","상관관계","인과관계"]},
{id:44,word:"상관관계",hanja:"相關關係",meaning:"두 변수 A와 B가 함께 변하는 경향이 있는 관계. 인과관계와 다르다.",example:"아이스크림 판매량과 익사 사고 건수가 함께 늘어나는 것은 인과가 아닌 상관관계이다.",similar:["인과관계","독립변인","귀납법"]},
{id:45,word:"인과관계",hanja:"因果關係",meaning:"A가 B를 일으키는 원인이라는 사실. 단순한 상관관계와는 다르다.",example:"흡연이 폐암의 원인이라는 것이 입증된 인과관계이다.",similar:["상관관계","인과","종속변인"]},
{id:46,word:"포괄적",hanja:"包括的",meaning:"어떤 대상이나 현상을 넓은 범위에서 모두 아우르는 성질.",example:"모든 구성원을 아우르는 포괄적인 복지 정책이 필요하다.",similar:["배타적","상호 보완적","총체적"]},
{id:47,word:"배타적",hanja:"排他的",meaning:"남을 배제하고 자기의 것만 내세우거나 독점하려는 성질.",example:"특정 집단만을 위하는 배타적 정책은 사회 갈등을 심화시킨다.",similar:["포괄적","양립 불가능성","이데올로기"]},
{id:48,word:"외부 효과",hanja:"外部效果",meaning:"경제 활동이 거래 당사자가 아닌 제삼자에게 의도치 않게 이익이나 손해를 주는 현상.",example:"공장의 매연이 인근 주민의 건강을 해치는 것이 부정적 외부 효과이다.",similar:["기회비용","한계 효용","메커니즘"]},
{id:49,word:"기회비용",hanja:"機會費用",meaning:"어떤 선택을 함으로써 포기해야 하는 대안들 중 가장 가치가 큰 것.",example:"대학 진학 대신 취업을 선택했을 때 포기한 대학 교육의 가치가 기회비용이다.",similar:["외부 효과","한계 효용","충분조건"]},
{id:50,word:"한계 효용",hanja:"限界效用",meaning:"재화를 한 단위 더 소비할 때 추가로 얻는 만족감. 일반적으로 소비가 늘수록 체감한다.",example:"배가 고플 때 밥 한 그릇의 만족감(한계 효용)이 두 그릇째보다 훨씬 크다.",similar:["기회비용","외부 효과","귀납적 도약"]},
// --- 심화 문법 및 통사론 ---
{id:51,word:"안긴문장",hanja:"안긴文章",meaning:"다른 문장 속에 들어가 하나의 문장 성분처럼 쓰이는 절.",example:"'나는 그가 왔음을 알았다'에서 '그가 왔음'이 안긴문장(명사절)이다.",similar:["안은문장","관형사절","명사절"]},
{id:52,word:"안은문장",hanja:"안은文章",meaning:"안긴문장을 포함하고 있는 전체 문장.",example:"'나는 그가 왔음을 알았다'에서 전체 문장이 안은문장이다.",similar:["안긴문장","명사절","부사절"]},
{id:53,word:"관형사절",hanja:"冠形詞節",meaning:"체언을 수식하는 절. 수식받는 체언이 절 내부의 성분이었으면 관계 관형사절, 내용을 보충하면 동격 관형사절이다.",example:"'내가 읽은 책'에서 '내가 읽은'이 관형사절이다.",similar:["명사절","부사절","서술절"]},
{id:54,word:"명사절",hanja:"名詞節",meaning:"문장에서 명사처럼 쓰여 주어나 목적어 역할을 하는 절. 명사형 어미 '-기', '-(으)ㅁ'이 붙는다.",example:"'달리기가 좋다'에서 '달리기'가 명사절이다.",similar:["관형사절","부사절","안긴문장"]},
{id:55,word:"부사절",hanja:"副詞節",meaning:"서술어를 꾸며주는 절. '-이', '-게', '-도록' 등이 붙는다.",example:"'꽃이 피게 봄이 왔다'에서 '꽃이 피게'가 부사절이다.",similar:["명사절","관형사절","서술절"]},
{id:56,word:"서술절",hanja:"敍述節",meaning:"전체 문장의 서술어 역할을 통째로 하는 절. '주어+(주어+서술어)' 형태.",example:"'토끼가 귀가 길다'에서 '귀가 길다'가 서술절이다.",similar:["명사절","부사절","관형사절"]},
{id:57,word:"품사 통용",hanja:"品詞通用",meaning:"하나의 단어가 형태 변화 없이 두 가지 이상의 품사로 쓰이는 현상.",example:"'오늘'이 '오늘 날씨가 좋다'(명사)와 '오늘 만난 사람'(부사)으로 쓰이는 것이 품사 통용이다.",similar:["수식언","체언","형식 형태소"]},
{id:58,word:"파생적 피동",hanja:"派生的被動",meaning:"피동 접미사(-이/히/리/기-)를 어근에 붙여 만드는 피동 표현.",example:"'잡히다', '보이다'처럼 접미사로 피동을 만드는 것이 파생적 피동이다.",similar:["통사적 피동","피동 표현","사동 접미사"]},
{id:59,word:"통사적 피동",hanja:"統辭的被動",meaning:"'-아/어지다', '-게 되다'를 활용하여 만드는 피동 표현.",example:"'문이 열어지다', '알게 되다'처럼 문법 구성으로 피동을 만드는 것이 통사적 피동이다.",similar:["파생적 피동","피동 표현","어미"]},
{id:60,word:"사동 접미사",hanja:"使動接尾辭",meaning:"주동사를 사동사로 바꿀 때 어근에 붙이는 접미사. '-이/히/리/기/우/구/추-'가 있다.",example:"'먹다'에 '-이-'를 붙여 '먹이다'(사동)로 만드는 '-이-'가 사동 접미사이다.",similar:["파생적 피동","사동 표현","접사"]},
{id:61,word:"본용언",hanja:"本用言",meaning:"실질적 의미를 가지고 문장의 핵심 서술 역할을 하는 용언.",example:"'먹어 보다'에서 '먹어'가 본용언이다.",similar:["보조용언","용언","어간"]},
{id:62,word:"보조용언",hanja:"補助用言",meaning:"본용언 뒤에서 의미를 보조하며 문법적 기능을 더하는 용언.",example:"'먹어 보다'에서 '보다'가 보조용언이다.",similar:["본용언","용언","어미"]},
// --- 중세 국어 ---
{id:63,word:"연철",hanja:"連綴",meaning:"중세 국어에서 앞 형태소의 받침을 뒤에 오는 모음 앞에 이어서 적는 표기법.",example:"'밥+이'를 '바비'로 쓰는 것이 연철 표기이다.",similar:["분철","혼철","모음 조화"]},
{id:64,word:"분철",hanja:"分綴",meaning:"형태소의 경계를 밝혀 받침과 모음을 끊어서 적는 표기법. 현대 국어의 기본 원칙이다.",example:"'밥+이'를 '밥이'로 쓰는 것이 분철 표기이다.",similar:["연철","혼철","8종성법"]},
{id:65,word:"혼철",hanja:"混綴",meaning:"연철과 분철을 혼합하여 사용하는 표기법. 근대 국어 시기에 나타난 과도기적 표기이다.",example:"'벋(友)+이'를 '벋디'처럼 연철과 분철을 섞어 쓰는 것이 혼철이다.",similar:["연철","분철","7종성법"]},
{id:66,word:"모음 조화",hanja:"母音調和",meaning:"양성 모음(ㅏ, ㅗ)은 양성끼리, 음성 모음(ㅓ, ㅜ, ㅡ)은 음성끼리 어울리려는 현상. 중세 국어에서 엄격히 지켜졌다.",example:"중세 국어에서 양성 모음 어간 뒤에는 '아', 음성 모음 뒤에는 '어'가 붙는 것이 모음 조화이다.",similar:["연철","어두 자음군","구개음화의 변천"]},
{id:67,word:"어두 자음군",hanja:"語頭子音群",meaning:"중세 국어 단어 첫머리에 두 개 이상의 자음이 함께 발음되었던 현상. 현대에는 된소리로 바뀌었다.",example:"중세 국어의 'ㅄ(뿐)', 'ㄳ' 등이 어두에 자음이 여러 개 쓰이던 어두 자음군이다.",similar:["8종성법","모음 조화","연철"]},
{id:68,word:"성조와 방점",hanja:"聲調와傍點",meaning:"중세 국어에서 소리의 높낮이(성조)를 표시하기 위해 글자 왼쪽에 찍은 점. 평성(점 없음), 거성(점 1개), 상성(점 2개)이 있었다.",example:"중세 국어 문헌에서 글자 왼쪽에 찍힌 점이 성조를 나타내는 방점이다.",similar:["어두 자음군","8종성법","모음 조화"]},
{id:69,word:"8종성법",hanja:"八終聲法",meaning:"중세 국어에서 받침에 'ㄱ, ㄴ, ㄷ, ㄹ, ㅁ, ㅂ, ㅅ, ㆁ' 8개의 자음만 사용하면 충분하다는 표기 원칙.",example:"훈민정음 반포 당시 받침에 8개의 자음만 쓰도록 한 규정이 8종성법이다.",similar:["7종성법","연철","어두 자음군"]},
{id:70,word:"7종성법",hanja:"七終聲法",meaning:"근대 국어 시기에 'ㄷ'과 'ㅅ' 받침이 혼용되다가 'ㄷ'이 사라진 7개 자음만 받침에 쓰이게 된 현상.",example:"중세의 8종성에서 'ㄷ'이 빠져 7종성이 된 것이 근대 국어의 7종성법이다.",similar:["8종성법","혼철","구개음화의 변천"]},
{id:71,word:"구개음화의 변천",hanja:"口蓋音化의變遷",meaning:"'ㄷ, ㅌ'이 'ㅣ' 모음 앞에서 'ㅈ, ㅊ'으로 바뀌는 현상. 중세에는 없었으나 근대 국어에서 발생했다.",example:"'디다'가 '지다'로 변하는 현상이 근대 국어의 구개음화의 변천이다.",similar:["모음 조화","원순 모음화","어두 자음군"]},
{id:72,word:"원순 모음화",hanja:"圓脣母音化",meaning:"입술소리(ㅁ, ㅂ, ㅍ) 아래의 'ㅡ'가 'ㅜ'로 바뀌는 현상. 근대 국어의 특징이다.",example:"'믈'이 '물'로 변하는 현상이 원순 모음화이다.",similar:["구개음화의 변천","모음 조화","전설 모음화"]},
{id:73,word:"전설 모음화",hanja:"前舌母音化",meaning:"'ㅅ, ㅈ, ㅊ' 아래의 'ㅡ'나 'ㅓ'가 'ㅣ'나 'ㅔ'로 바뀌는 현상.",example:"'치다' 등에서 나타나는 것처럼 마찰음·파찰음 아래에서 모음이 변하는 것이 전설 모음화이다.",similar:["원순 모음화","구개음화의 변천","모음 조화"]},
{id:74,word:"주격 조사 변천",hanja:"主格助詞變遷",meaning:"중세 국어에서 주격 조사 '가'는 없었고, 앞 글자의 끝소리에 따라 '이', 'ㅣ', 또는 생략되는 형태를 취했다.",example:"중세 국어에서 '바람이', '나ㅣ(나+ㅣ)'처럼 주격 조사가 앞 말에 따라 다른 형태로 쓰였다.",similar:["관형격 조사 변천","모음 조화","연철"]},
{id:75,word:"관형격 조사 변천",hanja:"冠形格助詞變遷",meaning:"중세 국어에서 관형격 조사는 사람·동물에게 '의/에', 사물이나 높임 대상에는 'ㅅ'을 쓰는 구별이 있었다.",example:"중세 국어에서 '부텻 뜻'(부처의 뜻)처럼 높임 대상에는 'ㅅ'을 쓰는 것이 관형격 조사 변천의 특징이다.",similar:["주격 조사 변천","8종성법","객체 높임 선어말 어미"]},
{id:76,word:"객체 높임 선어말 어미",hanja:"客體높임先語末語尾",meaning:"중세 국어에서 목적어나 부사어를 높일 때 어간 뒤에 붙던 선어말 어미. '-삽-, -잡-, -갑-'의 형태이다.",example:"중세 국어에서 '드리다'의 어간에 '-삽-'이 붙어 목적어를 높이는 것이 객체 높임 선어말 어미이다.",similar:["주체 높임법","객체 높임법","관형격 조사 변천"]},
{id:77,word:"소실된 문자",hanja:"消失된文字",meaning:"훈민정음 창제 이후 점차 쓰이지 않게 된 문자들. ㆆ→ㅿ→ㆁ→ㆍ의 순서로 소실됐다.",example:"ㆍ(아래아)는 현대 국어에서 소실된 대표적인 소실된 문자이다.",similar:["8종성법","어두 자음군","모음 조화"]},
{id:78,word:"동국정운식 표기",hanja:"東國正韻式表記",meaning:"중국 원음에 최대한 가깝게 한자음을 표기하려 했던 세종 대의 이상적인 한자음 표기 방식.",example:"현실 발음과 달리 형식적인 종성 'ㆁ'을 붙여 쓰는 것이 동국정운식 표기의 특징이다.",similar:["8종성법","연철","소실된 문자"]},
{id:79,word:"선어말 어미",hanja:"先語末語尾",meaning:"어간과 어말 어미 사이에 끼어 문법적 의미(시제, 높임, 공손)를 더하는 어미.",example:"'드셨습니다'에서 '-시-'(높임), '-었-'(과거)이 선어말 어미이다.",similar:["어미","어간","객체 높임 선어말 어미"]},

  if(pct>=95) return{emoji:'🏆',title:'류봉두의 수제자',sub:'완벽해요! 선생님도 놀랐을걸요?',color:'gold',bar:'#F5A623'};
  if(pct>=90) return{emoji:'⚔️',title:'류봉두의 오른팔',sub:'거의 다 왔어요! 한 끗 차이!',color:'silver',bar:'#8EAABB'};
  if(pct>=80) return{emoji:'🎓',title:'류봉두의 우등생',sub:'꽤 하는데요? 조금만 더!',color:'bronze',bar:'#C08553'};
  if(pct>=70) return{emoji:'🌿',title:'류봉두의 새싹',sub:'절반은 훌쩍 넘었어요. 분발해요!',color:'green',bar:'#43A047'};
  if(pct>=50) return{emoji:'🌱',title:'류봉두의 떡잎',sub:'가능성은 있어요. 복습이 필요해요!',color:'sprout',bar:'#7CB342'};
  return{emoji:'😭',title:'류봉두의 걱정거리',sub:'선생님이 울고 있어요… 다시 도전!',color:'red',bar:'#E53935'};
}

// 레벨별 단어풀
const WORD_POOLS={1:WORDS_1,2:WORDS_2,3:WORDS_3,4:WORDS_4,5:WORDS_5};

// STATE
let playerName='',selectedGrade=1,selectedCount=0;
let questions=[],currentIdx=0,score=0,correctCount=0;
let wrongWords=[],results=[],answered=false;
const LABELS=['①','②','③','④'];
const STORAGE_KEY='rbd_quiz_v6';

function getScores(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return[];}}
function saveScore(name,grade,sc,correct,total){
  const arr=getScores();
  arr.push({name,grade,score:sc,correct,total,pct:Math.round(correct/total*100),date:new Date().toLocaleDateString('ko-KR')});
  arr.sort((a,b)=>b.score-a.score);
  localStorage.setItem(STORAGE_KEY,JSON.stringify(arr.slice(0,50)));
}

function init(){
  renderScoreboard('score-list-start');
  if(getScores().length>0) document.getElementById('scoreboard-card').style.display='block';
  document.getElementById('name-input').addEventListener('input',e=>{
    document.getElementById('start-btn').disabled=e.target.value.trim().length===0;
  });
}

function selectGrade(el,grade){
  document.querySelectorAll('[data-grade]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectedGrade=grade;
  const pool=WORD_POOLS[grade];
  document.getElementById('count-all-sub').textContent=pool.length+'문제';
  document.querySelectorAll('[data-count]').forEach(b=>{
    const c=parseInt(b.dataset.count);
    if(c>0&&c>pool.length){b.style.opacity='.4';b.style.pointerEvents='none';}
    else{b.style.opacity='1';b.style.pointerEvents='auto';}
  });
}

function selectCount(el,count){
  document.querySelectorAll('[data-count]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectedCount=count;
}

// ── START QUIZ ──
function startQuiz(){
  playerName=document.getElementById('name-input').value.trim();
  if(!playerName) return;
  document.getElementById('topbar-user').textContent=playerName+'님';
  document.getElementById('topbar-user').style.display='block';

  const pool=WORD_POOLS[selectedGrade];
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const count=selectedCount===0?pool.length:Math.min(selectedCount,pool.length);
  const picked=shuffled.slice(0,count);

  // 고등·마스터는 유형 다양화
  const isHard=selectedGrade>=4;
  const types=['meaning','word','example'];
  const hardTypes=['meaning','word','example','similar_meaning','similar_word'];
  questions=picked.map((w,i)=>{
    const typePool=isHard?hardTypes:types;
    const t=typePool[i%typePool.length];
    return buildQ(w,t,pool,isHard);
  });

  currentIdx=0;score=0;correctCount=0;
  wrongWords=[];results=[];answered=false;
  showScreen('screen-quiz');
  updateLiveLevel();
  renderQ();
}

// ── BUILD QUESTION (오류 방지 강화) ──
function buildQ(word,type,pool,isHard){
  // 1) 예문에 단어 없으면 전환
  if(type==='example'||type==='similar_meaning'||type==='similar_word'){
    if(type==='example'&&!word.example.includes(word.word)) type='meaning';
  }
  // 2) similar 유형은 similar 배열 있을 때만
  if((type==='similar_meaning'||type==='similar_word')&&(!word.similar||word.similar.length<3)) type='meaning';

  let typeTag,qText,hint,correctText,options,diffClass='diff-normal';

  if(type==='similar_meaning'){
    // 고난도: 유사 개념 중 올바른 뜻 고르기
    typeTag='🔍 정밀 구분';
    diffClass='diff-hard';
    qText=`"${word.word}"의 뜻으로 가장 정확한 것은?`;
    hint=`관련 개념: ${word.similar.join(', ')}`;
    correctText=word.meaning;
    // 유사 개념 단어들의 뜻을 오답으로 사용
    const similarWords=word.similar.map(sw=>pool.find(w=>w.word===sw)).filter(Boolean);
    const wrongMeanings=similarWords.slice(0,3).map(w=>w.meaning);
    // 부족하면 일반 오답으로 채움
    while(wrongMeanings.length<3){
      const extra=pool.filter(w=>w.id!==word.id&&!word.similar.includes(w.word)).sort(()=>Math.random()-.5)[0];
      if(extra&&!wrongMeanings.includes(extra.meaning)) wrongMeanings.push(extra.meaning);
    }
    options=shuffle([word.meaning,...wrongMeanings.slice(0,3)]);

  } else if(type==='similar_word'){
    // 고난도: 뜻 보고 유사 개념 중 정답 단어 고르기
    typeTag='🎯 유사 개념 구별';
    diffClass='diff-expert';
    qText='다음 뜻에 해당하는 단어를 유사 개념 중에서 고르시오.';
    hint=word.meaning;
    correctText=word.word;
    const similarWords=word.similar.map(sw=>pool.find(w=>w.word===sw)).filter(Boolean);
    const wrongWords_=similarWords.slice(0,3).map(w=>w.word);
    while(wrongWords_.length<3){
      const extra=pool.filter(w=>w.id!==word.id&&!wrongWords_.includes(w.word)).sort(()=>Math.random()-.5)[0];
      if(extra) wrongWords_.push(extra.word);
    }
    options=shuffle([word.word,...wrongWords_.slice(0,3)]);

  } else if(type==='meaning'){
    typeTag='📖 뜻 찾기';
    qText=`"${word.word}"의 뜻은?`;
    hint=word.hanja?`한자: ${word.hanja}`:'';
    correctText=word.meaning;
    const wrong=getWrongOptions(word,pool,'meaning');
    options=shuffle([word.meaning,...wrong]);

  } else if(type==='word'){
    typeTag='🔤 단어 찾기';
    qText='다음 뜻에 해당하는 단어는?';
    hint=word.meaning;
    correctText=word.word;
    const wrong=getWrongOptions(word,pool,'word');
    options=shuffle([word.word,...wrong]);

  } else { // example
    typeTag='💬 예문 추론';
    qText='빈칸에 알맞은 단어를 고르시오.';
    const masked=word.example.replace(new RegExp(word.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'『　　　　』');
    hint=masked;
    correctText=word.word;
    const wrong=getWrongOptionsForExample(word,pool);
    options=shuffle([word.word,...wrong]);
  }

  // diff-normal은 중1~3, hard/expert는 고등·마스터
  if(selectedGrade<=3) diffClass='diff-normal';

  return{word,type,typeTag,qText,hint,correctText,options,diffClass};
}

function getWrongOptions(word,pool,field){
  return pool.filter(w=>w.id!==word.id)
    .sort(()=>Math.random()-.5)
    .slice(0,3)
    .map(w=>w[field]);
}

function getWrongOptionsForExample(word,pool){
  return pool.filter(w=>{
    if(w.id===word.id) return false;
    // 예문에 오답 단어가 포함되어 있으면 제외
    if(word.example.includes(w.word)) return false;
    return true;
  }).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.word);
}

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}

// ── LIVE LEVEL ──
function updateLiveLevel(){
  const el={emoji:document.getElementById('live-emoji'),title:document.getElementById('live-title'),sub:document.getElementById('live-sub'),pct:document.getElementById('live-pct'),bar:document.getElementById('live-bar')};
  if(currentIdx===0&&correctCount===0){
    el.emoji.textContent='🌱';el.title.textContent='류봉두의 떡잎';
    el.sub.textContent='문제를 풀수록 레벨이 올라가요!';
    el.pct.textContent='-';el.bar.style.width='0%';el.bar.style.backgroundColor='#7CB342';return;
  }
  const done=currentIdx+1,pct=Math.round(correctCount/done*100),t=getTitle(pct);
  el.emoji.textContent=t.emoji;el.title.textContent=t.title;
  el.sub.textContent=`${done}문제 중 ${correctCount}개 정답`;
  el.pct.textContent=pct+'%';el.bar.style.width=pct+'%';el.bar.style.backgroundColor=t.bar;
}

// ── RENDER QUESTION ──
function renderQ(){
  answered=false;
  const q=questions[currentIdx],total=questions.length;
  document.getElementById('progress-fill').style.width=((currentIdx/total)*100)+'%';
  document.getElementById('quiz-progress').textContent=`${currentIdx+1} / ${total}`;
  document.getElementById('quiz-score-badge').textContent=`${score}점`;
  document.getElementById('q-type-tag').textContent=q.typeTag;

  // 난이도 뱃지
  const db=document.getElementById('diff-badge');
  if(q.diffClass==='diff-hard'){db.className='difficulty-badge diff-hard';db.textContent='⚡ 고난도';}
  else if(q.diffClass==='diff-expert'){db.className='difficulty-badge diff-expert';db.textContent='🔥 최고난도';}
  else{db.className='';db.textContent='';}

  document.getElementById('q-text').textContent=q.qText;
  const hintEl=document.getElementById('q-hint');
  hintEl.textContent=q.hint;
  hintEl.className=q.hint?'q-hint':'q-hint no-hint';

  const ol=document.getElementById('options-list');
  ol.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-label">${LABELS[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(btn,opt,q);
    ol.appendChild(btn);
  });

  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').style.display='none';

  const card=document.getElementById('quiz-card');
  card.style.opacity='0';card.style.transform='translateY(8px)';
  requestAnimationFrame(()=>{card.style.transition='opacity .22s,transform .22s';card.style.opacity='1';card.style.transform='none';});
}

// ── SELECT ANSWER ──
function selectAnswer(btn,chosen,q){
  if(answered) return;
  answered=true;
  const isCorrect=chosen===q.correctText;
  const pts=Math.round(1000/questions.length);
  document.querySelectorAll('.option-btn').forEach(b=>{
    b.disabled=true;
    if(b.querySelector('span:last-child').textContent===q.correctText) b.classList.add('reveal');
  });
  if(isCorrect){btn.classList.remove('reveal');btn.classList.add('correct');score+=pts;correctCount++;}
  else{btn.classList.add('wrong');wrongWords.push({word:q.word,myAnswer:chosen});}
  results.push({word:q.word.word,type:q.type,correct:isCorrect,myAnswer:chosen,correctAnswer:q.correctText});
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box show '+(isCorrect?'ok':'ng');
  document.getElementById('fb-title').textContent=isCorrect?'🎉 정답입니다!':'❌ 틀렸어요';
  document.getElementById('fb-meaning').textContent=`${q.word.word}: ${q.word.meaning}`;
  document.getElementById('fb-example').textContent=`예문: ${q.word.example}`;
  document.getElementById('quiz-score-badge').textContent=`${score}점`;
  updateLiveLevel();
  document.getElementById('next-btn').style.display='block';
}

function nextQuestion(){currentIdx++;if(currentIdx>=questions.length)endQuiz();else renderQ();}

// ── END ──
function endQuiz(){
  const total=questions.length,pct=Math.round(correctCount/total*100);
  saveScore(playerName,GRADE_LABELS[selectedGrade],score,correctCount,total);
  const t=getTitle(pct);
  const banner=document.getElementById('title-banner');
  banner.className='title-banner '+t.color;
  document.getElementById('banner-emoji').textContent=t.emoji;
  document.getElementById('banner-title').textContent=t.title;
  document.getElementById('banner-sub').textContent=`${playerName}님 · ${pct}% 정답 · ${correctCount}/${total}문제\n${t.sub}`;
  document.getElementById('res-correct').textContent=correctCount;
  document.getElementById('res-wrong').textContent=total-correctCount;
  document.getElementById('res-score').textContent=score;
  const st=document.getElementById('send-status');
  st.style.display='none';st.className='send-status';
  const sb=document.getElementById('btn-send');
  sb.disabled=false;sb.textContent='📤 결과 전송하기';
  const ws=document.getElementById('wrong-section');
  if(wrongWords.length>0){
    ws.style.display='block';
    document.getElementById('wrong-count-badge').textContent=wrongWords.length+'개';
    document.getElementById('wrong-list').innerHTML=wrongWords.map(w=>
      `<div class="wrong-item"><div class="wrong-word">${w.word.word}${w.word.hanja?` (${w.word.hanja})`:''}</div><div class="wrong-meaning">${w.word.meaning}</div><div class="wrong-example">예문: ${w.word.example}</div></div>`
    ).join('');
  } else ws.style.display='none';
  renderScoreboard('score-list-result');
  showScreen('screen-result');
  window.scrollTo(0,0);
}

// ── SEND TO SHEET ──
async function sendToSheet(){
  const btn=document.getElementById('btn-send'),st=document.getElementById('send-status');
  btn.disabled=true;
  st.className='send-status sending';st.textContent='⏳ 전송 중...';
  const now=new Date();
  const dateStr=now.toLocaleDateString('ko-KR')+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const pct=Math.round(correctCount/questions.length*100);
  const payload={name:playerName,grade:GRADE_LABELS[selectedGrade],date:dateStr,score,correct:correctCount,total:questions.length,pct,titleStr:getTitle(pct).title,details:results.map(r=>`${r.word}:${r.correct?'O':'X'}`).join('|'),wrongWords:wrongWords.map(w=>w.word.word).join(', ')};
  try{
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    st.className='send-status sent';st.textContent='✅ 구글 시트에 전송되었습니다!';
    btn.textContent='✅ 전송 완료';
  }catch(e){
    st.className='send-status failed';st.textContent='❌ 전송 실패. 인터넷 연결을 확인해 주세요.';
    btn.disabled=false;
  }
}

// ── SCOREBOARD ──
function renderScoreboard(id){
  const el=document.getElementById(id);if(!el)return;
  const scores=getScores();
  if(!scores.length){el.innerHTML='<div style="text-align:center;color:var(--text3);font-size:13px;padding:16px 0">아직 기록이 없어요</div>';return;}
  el.innerHTML=scores.slice(0,10).map((s,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return `<div class="score-item"><span class="score-rank ${rc}">${medal}</span><span class="score-name">${s.name}</span><span class="grade-badge">${s.grade||''}</span><span style="font-size:11px;color:var(--text3)">${s.date}</span><span class="score-val">${s.pct}%</span></div>`;
  }).join('');
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function retryQuiz(){startQuiz();}
function goHome(){showScreen('screen-start');document.getElementById('topbar-user').style.display='none';renderScoreboard('score-list-start');document.getElementById('scoreboard-card').style.display=getScores().length?'block':'none';}

init();
</script>
